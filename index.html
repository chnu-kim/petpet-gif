<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PetPet Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f7;
      --bg-panel: #ffffff;
      --bg-input: #f0f0f0;
      --text: #111111;
      --text-muted: #888888;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-subtle: #eef2ff;
      --border: #e8e8e8;
      --border-strong: #d0d0d0;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
      --header-h: 56px;
    }

    [data-theme="dark"] {
      --bg: #0f0f0f;
      --bg-panel: #1a1a1a;
      --bg-input: #252525;
      --text: #f0f0f0;
      --text-muted: #777777;
      --accent: #818cf8;
      --accent-hover: #6366f1;
      --accent-subtle: rgba(99,102,241,.12);
      --border: #2a2a2a;
      --border-strong: #3a3a3a;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.18);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 0.95em;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    #themeToggle {
      width: 36px;
      height: 36px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #themeToggle:hover { background: var(--border); }

    /* ── Empty state ── */
    #emptyState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-h));
      padding: 48px 24px;
    }

    .empty-title {
      font-size: 1.6em;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
      text-align: center;
    }

    .empty-sub {
      font-size: 0.88em;
      color: var(--text-muted);
      margin-bottom: 36px;
      text-align: center;
    }

    .big-drop {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 480px;
      height: 220px;
      border: 2px dashed var(--border-strong);
      border-radius: 20px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--bg-panel);
    }
    .big-drop:hover, .big-drop.highlight {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .drop-icon { font-size: 36px; line-height: 1; opacity: 0.7; }

    .drop-text {
      font-size: 0.93em;
      font-weight: 500;
      color: var(--text);
    }

    .drop-hint {
      font-size: 0.78em;
      color: var(--text-muted);
    }

    .or-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 480px;
      margin: 22px 0;
      font-size: 0.8em;
      color: var(--text-muted);
    }
    .or-row::before, .or-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .url-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }

    .url-input {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.87em;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--text-muted); }

    .upload-error {
      font-size: 0.78em;
      color: #ef4444;
      min-height: 1.1em;
      margin-top: 8px;
      text-align: center;
    }

    /* ── Editor ── */
    #editor {
      display: none;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
      min-height: calc(100vh - var(--header-h));
    }

    /* ── Canvas column ── */
    .canvas-col {
      position: sticky;
      top: calc(var(--header-h) + 20px);
      align-self: start;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .canvas-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .canvas-frame {
      border-radius: 10px;
      overflow: hidden;
      background-color: #fff;
      background-image:
        linear-gradient(45deg, #e4e4e4 25%, transparent 25%),
        linear-gradient(-45deg, #e4e4e4 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e4e4e4 75%),
        linear-gradient(-45deg, transparent 75%, #e4e4e4 75%);
      background-size: 14px 14px;
      background-position: 0 0, 0 7px, 7px -7px, -7px 0;
      line-height: 0;
    }

    [data-theme="dark"] .canvas-frame {
      background-color: #1a1a1a;
      background-image:
        linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
    }

    #canvas {
      display: block;
      width: 320px;
      height: 320px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: default;
    }
    #canvas.adjust-mode { cursor: move; }

    .playback {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .play-btn {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, transform 0.1s;
      color: var(--text);
      padding: 0 14px;
    }
    .play-btn:hover { background: var(--border); }
    .play-btn:active { transform: scale(0.93); }

    #play {
      padding: 0 20px;
      background: var(--accent);
      color: white;
      border-color: transparent;
      font-size: 15px;
    }
    #play:hover { background: var(--accent-hover); }

    /* ── Controls column ── */
    .controls-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 24px;
    }

    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }

    .card-label {
      font-size: 0.7em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Image card ── */
    .change-img-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.85em;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
      text-align: left;
    }
    .change-img-btn:hover,
    .change-img-btn.highlight { background: var(--border-strong); border-color: var(--accent); }

    #uploadFileName {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text-muted);
    }

    /* ── Sliders ── */
    .control {
      display: grid;
      grid-template-columns: 68px 1fr 52px;
      align-items: center;
      gap: 10px;
      padding: 3px 0;
    }

    .ctrl-lbl {
      font-size: 0.83em;
      color: var(--text-muted);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      background: var(--bg-input);
      border-radius: 3px;
      cursor: pointer;
      outline: none;
      width: 100%;
      border: 1px solid var(--border);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }

    .ctrl-val {
      text-align: right;
      font-size: 0.82em;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }

    .divider { height: 1px; background: var(--border); margin: 10px 0; }

    /* ── Toggle buttons ── */
    .toggle-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text-muted);
      font-size: 0.82em;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    .toggle-btn[aria-pressed="true"] {
      background: var(--accent-subtle);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }

    /* ── FPS number input ── */
    .fps-number {
      width: 52px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 6px;
      color: var(--text);
      font-size: 0.83em;
      text-align: center;
      outline: none;
    }
    .fps-number:focus { border-color: var(--accent); }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 0.87em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      flex: 1;
      padding: 11px;
    }
    .btn-accent:hover { background: var(--accent-hover); }
    .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: var(--bg-input);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    .export-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #info {
      font-size: 0.78em;
      color: var(--text-muted);
      text-align: center;
      min-height: 1.1em;
      margin-top: 6px;
    }

    /* ── Overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #overlay.open { display: flex; }

    .overlay-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35);
      max-width: 360px;
      width: calc(100% - 40px);
      animation: fadeUp 0.22s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .overlay-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .overlay-label {
      font-size: 0.7em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    #overlayMeta {
      font-size: 0.78em;
      color: var(--text-muted);
    }

    #result {
      width: 224px;
      height: 224px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 10px;
      background-color: #fff;
      background-image:
        linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
        linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
        linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
      background-size: 14px 14px;
      background-position: 0 0, 0 7px, 7px -7px, -7px 0;
    }

    .overlay-actions {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    #download {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 20px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.87em;
      transition: background 0.15s;
    }
    #download:hover { background: var(--accent-hover); }

    /* ── Mobile ── */
    @media (max-width: 800px) {
      #editor { grid-template-columns: 1fr; }
      .canvas-col { position: static; }
      #canvas { width: min(80vw, 320px); height: min(80vw, 320px); }
      .canvas-frame { width: min(80vw, 320px); }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-brand">
      <div class="brand-icon">✋</div>
      <h1>PetPet Generator</h1>
    </div>
    <button id="themeToggle" title="테마 전환">🌙</button>
  </header>

  <!-- ── 빈 상태 ── -->
  <div id="emptyState">
    <p class="empty-title">PetPet GIF 만들기</p>
    <p class="empty-sub">이미지를 올리면 손이 쓰다듬는 GIF를 만들어드립니다</p>

    <label class="big-drop" id="dropArea">
      <span class="drop-icon">🖼</span>
      <span class="drop-text">클릭하거나 이미지를 드래그하세요</span>
      <span class="drop-hint">PNG · JPG · GIF · WebP</span>
      <input type="file" id="uploadFile" accept="image/*" style="display:none">
    </label>

    <div class="or-row">또는</div>

    <div class="url-row">
      <input class="url-input" type="text" id="uploadUrl" placeholder="이미지 URL 붙여넣기">
      <button class="btn btn-ghost" id="uploadUrlBtn">불러오기</button>
    </div>
    <p class="upload-error" id="uploadError"></p>
  </div>

  <!-- ── 에디터 ── -->
  <div id="editor">

    <!-- 캔버스 -->
    <div class="canvas-col">
      <div class="canvas-card">
        <div class="canvas-frame">
          <canvas id="canvas" width="112" height="112"></canvas>
          <img id="uploadPreview" style="display:none" alt="">
        </div>
        <div class="playback">
          <button class="play-btn" id="prev" title="이전 프레임">⏮</button>
          <button class="play-btn" id="play" title="재생/정지">⏸</button>
          <button class="play-btn" id="next" title="다음 프레임">⏭</button>
        </div>
      </div>
    </div>

    <!-- 컨트롤 -->
    <div class="controls-col">

      <!-- 이미지 변경 -->
      <div class="card">
        <p class="card-label">이미지</p>
        <label class="change-img-btn" id="dropAreaEditor">
          <span style="font-size:15px">🖼</span>
          <span id="uploadFileName">이미지 변경</span>
        </label>
        <p class="upload-error" id="uploadErrorEditor"></p>
      </div>

      <!-- 이미지 조절 -->
      <div class="card">
        <p class="card-label">조절</p>

        <div class="control">
          <span class="ctrl-lbl">크기</span>
          <input type="range" id="scale" min="20" max="200" value="87">
          <span class="ctrl-val" id="scaleVal">87%</span>
        </div>
        <div class="control">
          <span class="ctrl-lbl">X 위치</span>
          <input type="range" id="spriteXSlider" min="-112" max="224" value="14">
          <span class="ctrl-val" id="spriteXVal">14</span>
        </div>
        <div class="control">
          <span class="ctrl-lbl">Y 위치</span>
          <input type="range" id="spriteYSlider" min="-112" max="224" value="20">
          <span class="ctrl-val" id="spriteYVal">20</span>
        </div>

        <div class="divider"></div>

        <div class="control">
          <span class="ctrl-lbl">눌림</span>
          <input type="range" id="squish" min="100" max="300" value="125">
          <span class="ctrl-val" id="squishVal">125%</span>
        </div>

        <div class="divider"></div>

        <div class="toggle-row">
          <button class="toggle-btn" id="toggleFlip" aria-pressed="false">↔ 좌우 반전</button>
          <button class="toggle-btn" id="toggleAdjust" aria-pressed="false">✥ 드래그 모드</button>
        </div>
      </div>

      <!-- 속도 -->
      <div class="card">
        <p class="card-label">재생 속도</p>
        <div class="control">
          <span class="ctrl-lbl">FPS</span>
          <input type="range" id="fps" min="2" max="60" value="16">
          <input type="number" class="fps-number" id="fpsVal" min="2" max="60" value="16">
        </div>
      </div>

      <!-- 내보내기 -->
      <div class="card">
        <p class="card-label">내보내기</p>
        <div class="export-row">
          <button class="btn btn-ghost" id="reset">↩ 초기화</button>
          <button class="btn btn-accent" id="export">GIF 생성</button>
        </div>
        <p id="info"></p>
      </div>

    </div>
  </div>

  <!-- ── GIF 결과 오버레이 ── -->
  <div id="overlay">
    <div class="overlay-card">
      <div class="overlay-header">
        <span class="overlay-label">생성 완료</span>
        <span id="overlayMeta"></span>
      </div>
      <img id="result" alt="생성된 GIF">
      <div class="overlay-actions">
        <button class="btn btn-ghost" id="closeOverlay">닫기</button>
        <a id="download" href="#" download="petpet.gif">다운로드</a>
      </div>
    </div>
  </div>

  <script src="requestInterval.js"></script>
  <script src="gif.js"></script>
  <script src="main.js"></script>
</body>
</html>
